{% load static %}

<!-- AI Chatbot Widget -->
<div id="chatbot-container" class="fixed bottom-0 left-0 z-[9999]">
    <!-- Backdrop overlay for mobile (hidden by default) -->
    <div id="chatbotBackdrop" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[9997] transition-opacity duration-300 opacity-0"></div>
    
    <!-- Floating Chat Button -->
    <button 
        id="chatbotTrigger" 
        class="fixed bottom-5 left-5 inline-flex items-center justify-center w-14 h-14 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white rounded-full shadow-xl transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-blue-300 z-[9998] hover:scale-110 active:scale-95"
        aria-label="Open AI Assistant"
        title="Need help? Ask our AI assistant!"
    >
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h.01M12 8h.01M17 8h.01M8 16h8m-9 3h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
        <!-- AI badge -->
        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[11px] font-bold rounded-full h-5 w-5 flex items-center justify-center">AI</span>
    </button>
    
    <!-- Chat Modal (Hidden by default) -->
    <div 
        id="chatbotModal" 
        class="fixed bottom-24 left-6 w-96 max-w-[calc(100vw-3rem)] bg-white rounded-2xl shadow-2xl transform transition-all duration-300 scale-0 opacity-0 origin-bottom-left md:w-96 sm:w-80"
        style="height: min(600px, calc(100vh - 180px)); max-height: calc(100vh - 180px);"
    >
        <!-- Header -->
        <div class="bg-blue-600 text-white p-4 rounded-t-2xl flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg">Smart Assistant</h3>
                    <p class="text-xs text-white/80">Powered by Gemini AI</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <!-- Reset Conversation Button -->
                <button 
                    onclick="resetChatbotConversation()" 
                    class="hover:bg-white/20 p-2 rounded-lg transition-colors"
                    title="Start new conversation"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                </button>
                <!-- Close Button -->
                <button 
                    onclick="closeChatbot()" 
                    class="hover:bg-white/20 p-2 rounded-lg transition-colors text-2xl leading-none"
                    aria-label="Close chatbot"
                >
                    ×
                </button>
            </div>
        </div>
        
        <!-- Messages Container -->
        <div id="chatMessages" class="overflow-y-auto p-4 space-y-4 bg-gray-50" style="height: calc(100% - 140px);">
            <!-- Welcome Message -->
            <div class="flex gap-2 animate-fade-in">
                <div class="flex-shrink-0">
                    <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                        </svg>
                    </div>
                </div>
                <div class="flex-1 bg-white rounded-lg shadow-sm p-3 max-w-[85%]">
                    <p class="text-sm text-gray-800">
                        👋 <strong>Hi{% if request.user.is_authenticated %}, {{ request.user.get_full_name|default:request.user.username }}{% endif %}!</strong><br>
                        I'm your Smart Dorm Finder assistant. What would you like to know about?
                    </p>
                    
                    <!-- Quick Reply Buttons -->
                    <div id="quickRepliesContainer" class="mt-3 space-y-2">
                        <!-- Category Buttons -->
                        <div id="categoryButtons" class="grid grid-cols-2 gap-2">
                            <button onclick="showAccountButtons()" class="quick-reply-btn bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-xs font-medium transition-colors flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                Account
                            </button>
                            <button onclick="showReservationButtons()" class="quick-reply-btn bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-xs font-medium transition-colors flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                Reservation
                            </button>
                            <button onclick="showPaymentButtons()" class="quick-reply-btn bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-xs font-medium transition-colors flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                                Payment
                            </button>
                            <button onclick="showDormButtons()" class="quick-reply-btn bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-xs font-medium transition-colors flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                                Dorms
                            </button>
                        </div>
                        
                        <!-- Sub-buttons (hidden by default) -->
                        <div id="subButtons" class="hidden space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Input Area -->
        <div class="border-t border-gray-200 p-4 bg-white rounded-b-2xl">
            <form id="chatForm" class="flex gap-2">
                <input 
                    type="text" 
                    id="chatInput" 
                    placeholder="Type your message..." 
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                    maxlength="1000"
                    autocomplete="off"
                />
                <button 
                    type="submit" 
                    id="chatSendBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center gap-2 font-medium"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    Send
                </button>
            </form>
            <p class="text-xs text-gray-400 mt-2 text-center">
                AI-powered assistance may not always be accurate
            </p>
        </div>
    </div>
</div>

<!-- Chatbot JavaScript -->
<script src="{% static 'js/chatbot.js' %}"></script>

<!-- Inline Styles for Animations -->
<style>
@keyframes fade-in {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-fade-in {
    animation: fade-in 0.3s ease-out;
}

/* Typing indicator animation */
@keyframes typing {
    0%, 60%, 100% {
        transform: translateY(0);
    }
    30% {
        transform: translateY(-10px);
    }
}

.typing-dot {
    animation: typing 1.4s infinite;
}

.typing-dot:nth-child(2) {
    animation-delay: 0.2s;
}

.typing-dot:nth-child(3) {
    animation-delay: 0.4s;
}

/* Smooth scrollbar */
#chatMessages::-webkit-scrollbar {
    width: 6px;
}

#chatMessages::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

#chatMessages::-webkit-scrollbar-thumb {
    background: #cbd5e0;
    border-radius: 10px;
}

#chatMessages::-webkit-scrollbar-thumb:hover {
    background: #a0aec0;
}

/* Mobile responsive adjustments */
@media (max-width: 1024px) {
    #chatbotModal {
        width: 360px !important;
        max-height: calc(100vh - 160px);
        height: min(550px, calc(100vh - 160px)) !important;
    }
}

@media (max-width: 768px) {
    #chatbotModal {
        width: calc(100vw - 3rem) !important;
        left: 1.5rem;
        bottom: 5.5rem;
        max-height: calc(100vh - 140px);
        height: min(500px, calc(100vh - 140px)) !important;
    }
    
    #chatbotTrigger {
        bottom: 1.25rem;
        left: 1.25rem;
        width: 52px;
        height: 52px;
    }
    
    #chatbotTrigger svg {
        width: 1.5rem;
        height: 1.5rem;
    }
    
    #chatbotTrigger .absolute {
        font-size: 10px;
        width: 18px;
        height: 18px;
    }
}

@media (max-width: 640px) {
    #chatbotModal {
        width: calc(100vw - 2rem) !important;
        left: 1rem;
        right: 1rem;
        bottom: 5rem;
        max-height: calc(100vh - 120px);
        height: min(480px, calc(100vh - 120px)) !important;
        border-radius: 1rem;
    }
    
    #chatbotTrigger {
        bottom: 1rem;
        left: 1rem;
        width: 50px;
        height: 50px;
    }
    
    #chatMessages {
        padding: 0.75rem;
    }
    
    .bg-blue-600.text-white.p-4 {
        padding: 0.875rem !important;
    }
    
    .border-t.border-gray-200.p-4 {
        padding: 0.875rem !important;
    }
    
    #chatForm input {
        font-size: 14px;
        padding: 0.5rem 0.75rem;
    }
    
    #chatForm button {
        padding: 0.5rem 0.75rem;
        font-size: 14px;
    }
    
    #chatForm button svg {
        width: 1rem;
        height: 1rem;
    }
}

@media (max-width: 480px) {
    #chatbotModal {
        width: calc(100vw - 1.5rem) !important;
        left: 0.75rem;
        right: 0.75rem;
        bottom: 4.5rem;
        max-height: calc(100vh - 100px);
        height: min(450px, calc(100vh - 100px)) !important;
    }
    
    #chatbotTrigger {
        bottom: 0.875rem;
        left: 0.875rem;
        width: 48px;
        height: 48px;
    }
    
    #chatbotTrigger svg {
        width: 1.25rem;
        height: 1.25rem;
    }
    
    #chatMessages {
        padding: 0.625rem;
        gap: 0.75rem;
    }
    
    .bg-blue-600.text-white.p-4 {
        padding: 0.75rem !important;
    }
    
    .border-t.border-gray-200.p-4 {
        padding: 0.75rem !important;
    }
    
    #chatForm {
        gap: 0.5rem;
    }
    
    #chatForm input {
        font-size: 13px;
        padding: 0.5rem;
    }
    
    #chatForm button {
        padding: 0.5rem;
    }
    
    #chatForm button span {
        display: none;
    }
    
    .quick-reply-btn {
        font-size: 11px;
        padding: 0.375rem 0.625rem !important;
    }
}

@media (max-width: 375px) {
    #chatbotModal {
        width: calc(100vw - 1rem) !important;
        left: 0.5rem;
        right: 0.5rem;
        bottom: 4rem;
        max-height: calc(100vh - 90px);
        height: min(420px, calc(100vh - 90px)) !important;
    }
    
    #chatbotTrigger {
        bottom: 0.75rem;
        left: 0.75rem;
        width: 46px;
        height: 46px;
    }
}

/* Ensure smooth transitions */
#chatbotModal {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform, opacity;
}

#chatbotModal.show {
    transform: scale(1) !important;
    opacity: 1 !important;
}

/* Backdrop transitions */
#chatbotBackdrop {
    transition: opacity 0.3s ease-in-out;
}

#chatbotBackdrop.opacity-100 {
    opacity: 1 !important;
}

/* Prevent content overflow */
#chatMessages {
    overflow-x: hidden;
    word-wrap: break-word;
    -webkit-overflow-scrolling: touch;
}

/* Ensure chatbot doesn't overlap navbar */
@media (max-height: 700px) {
    #chatbotModal {
        max-height: calc(100vh - 100px) !important;
        height: min(450px, calc(100vh - 100px)) !important;
    }
}

@media (max-height: 600px) {
    #chatbotModal {
        max-height: calc(100vh - 90px) !important;
        height: min(400px, calc(100vh - 90px)) !important;
    }
    
    #chatMessages {
        padding: 0.5rem;
    }
}

/* Button hover and focus states */
#chatbotTrigger:focus-visible {
    outline: none;
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.3);
}

#chatbotTrigger:active {
    transform: scale(0.95);
}


</style>
